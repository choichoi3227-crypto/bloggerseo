# wrangler.toml
# Blogspot SEO & Performance Optimization Worker
# ─────────────────────────────────────────────────
# 설정 제로 — Cloudflare 대시보드에서 Route만 추가하면 끝.
# 환경변수/Secret 설정 불필요.

name = "blogspot-seo-worker"
main = "worker.js"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]

# ─── KV 네임스페이스 ────────────────────────────────────────────────
# SLUG_KV     : CNAME 검증 캐시 + SEO 슬러그 + LB RTT 기록용
# CACHE_RESERVE_KV : HTML 페이지 캐시용 (선택사항 — 없어도 동작)
[[kv_namespaces]]
binding = "SLUG_KV"
id      = "dee1ee21fe4c44559bce049b53cf4d0a"

[[kv_namespaces]]
binding = "CACHE_RESERVE_KV"
id      = "7153daa4c5874bc581670f75adf66a22"

# ─── 스케줄드 트리거 (슬러그 canonical 감사, 매시간) ────────────────
[triggers]
crons = ["0 * * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1



[placement]
mode = "smart"


# ─── 동작 원리 ──────────────────────────────────────────────────────
# 1. 요청 호스트의 CNAME이 ghs.google.com인지 1.1.1.1 DoH로 검증.
#    검증 결과는 SLUG_KV에 24시간 캐시 → 이후 요청은 KV 즉시 조회.
#
# 2. 검증 통과 시 커스텀 도메인으로 직접 fetch (blogspot.com 불필요).
#    /feeds/*, /sitemap*.xml, /atom.xml, /rss.xml → 그대로 프록시.
#    HTML 페이지 → SEO 최적화(메타태그, schema.org, canonical) 후 반환.
#
# 3. 검증 실패 시 502 Bad Gateway (사이트 준비 중 페이지 없음).
#
# ─── Cloudflare 라우트 설정 방법 ────────────────────────────────────
# Workers & Pages → blogspot-seo-worker → Settings → Triggers
# Custom Domains 또는 Routes에 커스텀 도메인 추가:
#   예) blog.example.com/*
#       www.example.com/*
# ghs.google.com CNAME이 있는 서브도메인이면 자동으로 작동.
