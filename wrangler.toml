# wrangler.toml
# Blogspot SEO & Performance Optimization Worker 설정

name = "blogspot-seo-worker"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── KV 네임스페이스 ───────────────────────────────────────
# 배포 전 `wrangler kv:namespace create SLUG_KV` 실행 후 id 입력
# 배포 전 `wrangler kv:namespace create CACHE_RESERVE_KV` 실행 후 id 입력
[[kv_namespaces]]
binding = "SLUG_KV"
id      = "dee1ee21fe4c44559bce049b53cf4d0a"

[[kv_namespaces]]
binding = "CACHE_RESERVE_KV"
id      = "7153daa4c5874bc581670f75adf66a22"

# ─── 스케줄드 트리거 (6개월마다 슬러그 감사) ───────────────
[triggers]
crons = ["0 0 1 */6 *"]
