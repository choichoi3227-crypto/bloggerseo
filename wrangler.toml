# wrangler.toml
# Blogspot SEO & Performance Optimization Worker

name = "blogspot-seo-worker"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── KV 네임스페이스 ───────────────────────────────────────
[[kv_namespaces]]
binding = "SLUG_KV"
id      = "dee1ee21fe4c44559bce049b53cf4d0a"

[[kv_namespaces]]
binding = "CACHE_RESERVE_KV"
id      = "7153daa4c5874bc581670f75adf66a22"

# ─── 스케줄드 트리거 ────────────────────────────────────────
[triggers]
crons = ["0 * * * *"]


[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1


# ─── 선택적 환경 변수 (Workers 대시보드 Settings에서 추가) ──
# 아래는 모두 선택사항. 설정 안 해도 기본값으로 동작.
#
# LB_ALGO      로드밸런싱 알고리즘 (기본: least_rtt)
#              선택값: least_rtt | round_robin | weighted_rr |
#                      least_connections | least_bandwidth | ip_hash | geo
#
# LB_WEIGHTS   가중 라운드로빈용 JSON (LB_ALGO=weighted_rr 일 때만 사용)
#              예: {"https://aaa.blogspot.com":3,"https://bbb.blogspot.com":1}
#
# LB_GEO_MAP   지역 라우팅 맵 JSON (LB_ALGO=geo 일 때만 사용)
#              예: {"APAC":"https://aaa.blogspot.com","NA":"https://bbb.blogspot.com"}
#              지역코드: APAC | NA | EU | SA | MEA
