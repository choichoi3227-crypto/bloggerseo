# wrangler.toml — BloggerSEO Worker v13
# ─────────────────────────────────────────────────────────────────────
# v13 신규/변경 (우선순위 1+2):
#   - DNS Proxied(주황 구름) 리디렉션 무한 루프 근본 수정 (bloggerFetch)
#   - WASM 사용 확대: 본문 텍스트 추출/meta description(CJK-aware)/
#     SHA-256/HMAC/Base64/상수시간비교 실연결 + 인코딩 버그 수정
# v7 신규/변경 기능:
#   1. 자동 스키마 마크업 (Article/FAQ/Breadcrumb/Product, 필수: Article/FAQ)
#   2. Argo Smart Routing (자체 구현)
#   3. Regional Tiered Cache (자체 구현)
#   4. 모바일·데스크탑 최적화
#   5. Priority Routing (자체 구현)
#   6. 구글·네이버·빙 상위노출 극대화
#   7. 실시간 상태 저장 엔진 (KV·D1 없이 자체 NoSQL, DO Redis 1순위)
#   8. Cache Reserve (4시간 만료, 자체 구현)
#   9. 100% 자체 제작 서버리스 Redis (Durable Objects 기반, 64-way 샤딩)
#  10. Cron: 사이트맵(1시간) + RSS(30분)
#  11. 자체 로드밸런싱
#  12. 관리 패널 (Cloudflare + Worker 자동 연동 + Redis 관리 탭)
#
# ⚠️ 시크릿은 이 파일에 직접 적지 않습니다. README의 "시크릿 설정" 절차를
#    따라 `wrangler secret put`으로 등록하세요.

name = "bloggerseo"
main = "worker.js"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]

# ─── KV: 슬러그 백업용 (DO Redis가 1순위, KV는 2순위 백업 영속 스토리지) ───
[[kv_namespaces]]
binding = "SLUG_KV"
id      = "4fe8b16587f04703abe9e913763f58f7"

# ─── 자체 제작 서버리스 Redis: Durable Objects 바인딩 ───────────────────
# class_name은 Cloudflare 대시보드에서 먼저 생성한 네임스페이스
# (bloggerseodur_MyDurableObject)의 클래스명과 일치시킨 것 — 역할은 자체 Redis 샤드.
# Workers Free 플랜에서 동작 — SQLite storage backend만 사용 (KV storage backend는 유료 전용)
[[durable_objects.bindings]]
name       = "REDIS_SHARD"
class_name = "MyDurableObject"

[[migrations]]
tag         = "v1"
new_sqlite_classes = ["MyDurableObject"]

# ─── 환경 변수 (비밀이 아닌 값만) ────────────────────────────────────────
[vars]
# ⚠️ [필수 배포 전 조치 — 관리 패널 보안] PANEL_SECRET은 여기 [vars]에
# 평문으로 적지 말고 반드시 `wrangler secret put PANEL_SECRET` 명령으로
# 별도 등록하세요(16자 이상 임의 문자열 권장). worker.js v13부터 이
# 시크릿이 없거나 16자 미만이면 /panel 자체가 503으로 완전히 차단되도록
# 바뀌었습니다(이전 버전은 시크릿 미설정 시 소스코드에 노출된 기본값
# 'change-me-in-dashboard'로 조용히 폴백해, 배포자가 이를 놓치면 관리
# 패널이 사실상 인증 없이 전체 인터넷에 노출되는 심각한 보안 결함이
# 있었습니다).
RATE_LIMIT_PER_MIN     = "600"
CACHE_RESERVE_TTL_SEC  = "1800"      # 4시간 = 14400초
MAX_WORKER_INSTANCES   = "100"         # 로드밸런싱: 최대 워커 인스턴스
ARGO_REGIONS           = "KR,JP,US,EU"
PRIORITY_ROUTING_TIERS = "3"
REDIS_SHARD_COUNT      = "100"         # 자체 Redis 샤드 수 (늘릴수록 총 용량 선형 증가)
# 개인도메인 설정 — 설정 불필요 (자동 감지)
# ─────────────────────────────────────────────────────────────────────────
# BloggerSEO v8은 아무것도 설정하지 않아도 개인도메인을 자동으로 감지합니다:
#   1. 개인도메인으로 첫 HTTP 요청이 들어오는 순간 host를 자동 저장
#   2. 블로그 제목은 홈페이지 <title>에서 자동 추출
#   3. 이후 사이트맵/RSS/스키마 등 모든 URL이 실제 도메인으로 자동 생성
#
# 강제로 덮어씌우고 싶을 때만 아래 값을 채우세요 (보통 불필요):
SITE_BASE_URL          = ""           # 예: "https://your-domain.com" (비워두면 자동감지)
SITE_HOST              = ""           # 예: "your-domain.com" (비워두면 자동감지)
SITE_TITLE             = ""           # 블로그 제목 (비워두면 <title>에서 자동추출)
SITE_LANG              = "ko"         # 기본 언어 (hreflang 주입)

NAVER_SITE_VERIFY      = ""           # 네이버 서치어드바이저 인증키
BING_SITE_VERIFY       = ""           # 빙 웹마스터 인증키
GOOGLE_SITE_VERIFY     = ""           # 구글 서치콘솔 인증키
AI_FAQ_ENABLED         = "true"       # Workers AI로 FAQ 자동 추출 (env.AI 바인딩 필요)
INDEXNOW_KEY           = ""           # IndexNow API 키 (Bing/Yandex 빠른 색인 — wrangler secret 추천)

# ─── 신규 보안/성능 자동화 ─────────────────────────────────────────────
ADS_CLICK_WINDOW_HOURS = "1"           # 애드센스 부정 클릭 판단 윈도우(시간)
ADS_MAX_CLICKS         = "3"           # 윈도우 내 허용 클릭 수
ADS_BLOCK_DAYS         = "7"           # 초과 시 광고 숨김 기간(일)
VPN_AUTO_BLOCK_ENABLED = "true"        # VPN/프록시 자동 감지 + IP 차단
VPN_THREAT_SCORE       = "25"          # Cloudflare threatScore 기준
VPN_BLOCK_DAYS         = "7"
PANEL_CF_BOT_MFA       = "true"        # 패널 2차 인증: Cloudflare Bot Fight/봇 점수
PANEL_MIN_BOT_SCORE    = "30"

# ─── Blogger API 연동 (bp-admin 글 관리) ───────────────────────────────
# Blogspot에 직접 로그인하지 않고 /bp-admin에서 글을 쓰고 발행하려면
# Google OAuth2 클라이언트가 필요합니다. 아래 두 값은 절대 [vars]에
# 평문으로 두지 말고 반드시 시크릿으로 등록하세요:
#   wrangler secret put GOOGLE_OAUTH_CLIENT_ID
#   wrangler secret put GOOGLE_OAUTH_CLIENT_SECRET
#
# 발급 방법:
#   1. https://console.cloud.google.com/apis/credentials 접속
#   2. "OAuth 클라이언트 ID 만들기" → 애플리케이션 유형: 웹 애플리케이션
#   3. 승인된 리디렉션 URI에 다음을 추가: https://{도메인}/bp-admin/api/blogger/oauth/callback
#   4. API 및 서비스 > 라이브러리에서 "Blogger API v3" 활성화
#   5. 발급된 클라이언트 ID/보안 비밀번호를 위 secret 명령으로 등록
GOOGLE_OAUTH_REDIRECT_PATH = "/bp-admin/api/blogger/oauth/callback"

# ─── AI 글쓰기/썸네일 생성 (bp-admin) ───────────────────────────────────
# 아래 값은 절대 [vars]에 평문으로 두지 말고 반드시 시크릿으로 등록하세요:
#   wrangler secret put GEMINI_API_KEY
#
# 발급 방법: https://aistudio.google.com/app/apikey 에서 무료로 발급.
# 여러 키를 쉼표로 구분해 등록하면 라운드로빈 로테이션 + 레이트리밋
# (429/503) 자동 우회를 지원합니다. 예:
#   wrangler secret put GEMINI_API_KEY
#   (프롬프트에서) AIzaSy...key1,AIzaSy...key2,AIzaSy...key3
#
# 썸네일 이미지 실제 렌더링은 별도 API 키가 필요 없습니다 — 이미 위의
# [ai] binding = "AI" (Cloudflare Workers AI)를 그대로 사용합니다.

# Cloudflare API (관리 패널의 "워커/라우트 연동" 기능용 — 토큰은 secret으로 등록)
CF_ZONE_ID             = ""           # Zone ID (비밀 아님, 여기 직접 입력 가능)
CF_ACCOUNT_ID          = ""           # Account ID (비밀 아님, 여기 직접 입력 가능)

# ─── SSL/TLS 자동 인증서 관리 ────────────────────────────────────────────
# ✅ 블로그스팟(Blogger) 커스텀 도메인에 별도 SSL 인증서를 발급받을 필요가
#    없습니다. 이 Worker는 항상 ghs.google.com으로 직접 HTTPS 접속하고
#    Host 헤더로 블로그를 구분하므로, CF_API_TOKEN 없이도 완전히 동작합니다.
#    (CF_API_TOKEN은 패널의 "워커/라우트 자동 연동" 같은 선택 기능에만
#    필요하며, SSL 자체의 발급/적용에는 필요하지 않습니다.)
#
# ⚠️ [Error 525 방지 — 필수 설정] Cloudflare 대시보드 → SSL/TLS → Overview
#    에서 암호화 모드를 반드시 "Flexible"로 설정하세요. Full/Full(strict)
#    모드에서는 Cloudflare 엣지가 커스텀 도메인 자체의 origin 인증서를
#    요구하다 실패해 Error 525/526이 발생할 수 있습니다. Flexible 모드에서는
#    방문자 ↔ Cloudflare 엣지 구간만 HTTPS이면 되고, Worker 내부의 origin
#    fetch(ghs.google.com)는 Worker 코드가 별도로 HTTPS 처리하므로 문제
#    없습니다.
#
# CF_API_TOKEN을 선택적으로 secret 등록하려면(패널의 워커/라우트 자동 연동
# 기능용, SSL 발급과는 무관):
#   wrangler secret put CF_API_TOKEN
#   (필요 권한: Zone:SSL and Certificates:Edit, Zone:Zone Settings:Edit)
#
# SSL_CA: 인증서 발급 CA 선택 (lets_encrypt 또는 google) — Cloudflare
# Universal SSL이 방문자용 인증서에 사용하는 CA 참고값(정보 표시용)
SSL_CA                 = "lets_encrypt"  # 또는 "google" (Google Trust Services)

# ─── Workers AI 바인딩 (FAQ 자동 추출) ──────────────────────────────────
[ai]
binding = "AI"

# ─── 스케줄드 트리거 ─────────────────────────────────────────────────
# - 매 30분: RSS 생성
# - 매 1시간: 사이트맵 생성 + 슬러그 감사 + 캐시 예약 만료 정리
[triggers]
crons = ["*/30 * * * *", "0 * * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[placement]
mode = "smart"

# ─── bp-admin 정적 자산 (Astro 빌드 산출물) ────────────────────────────
# bp-admin-src/ 에서 `npm run build` → scripts/build-bp-admin.sh 로 생성된
# bp-admin-dist/ 폴더를 가리킨다. 배포 전 반드시
#   bash scripts/build-bp-admin.sh
# 를 먼저 실행해야 한다 (Astro 빌드 + 경로 재배치를 한 번에 처리).
[assets]
directory = "./bp-admin-dist"
binding   = "BP_ADMIN_ASSETS"
# html_handling: "auto-trailing-slash" — 확장자 없는 경로(/bp-admin/login)를
# 대응하는 login.html 파일에 자동 매핑한다(astro.config.mjs의
# build.format='file' 산출물과 짝을 이루는 필수 설정. 폴더+index.html 구조가
# 아니라 파일 하나짜리 구조이므로 auto-trailing-slash가 file.html → /file
# 로 정확히 매핑해 준다).
html_handling = "auto-trailing-slash"
# not_found_handling: SPA가 아니라 Astro의 다중 정적 페이지 구조이므로
# 404는 Astro가 생성한 실제 404 페이지 유무에 맡긴다(자동 폴백 없음).
not_found_handling = "404-page"
# run_worker_first: [필수] 기본값(false)은 정적 자산이 매칭되면 Worker 코드를
# 완전히 건너뛰고 Cloudflare가 곧바로 서빙한다. 그러면 bp-admin-router.js의
# 세션 체크(로그인 안 한 사용자를 /bp-admin/login으로 리다이렉트하는 로직)가
# 절대 실행되지 않아, 인증 없이도 대시보드 HTML이 그대로 노출된다.
# /bp-admin* 경로는 Worker가 먼저 실행되어 인증 게이트를 통과해야 하므로
# 명시적으로 지정한다(다른 정적 자산이 없는 프로젝트이므로 전체 경로 지정).
run_worker_first = ["/bp-admin*"]
