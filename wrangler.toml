# wrangler.toml — BloggerSEO Worker v5
# ──────────────────────────────────────────────────────────────────
# v5 변경:
#   - CNAME_KV 제거 (인스턴스 메모리로 대체, KV 사용 0)
#   - CACHE_RESERVE_KV 제거 (완전 제거)
#   - SLUG_KV 단독 유지 (slug:origin:* / slug:alias:* 영속 저장)
#   - GitHub API 관련 vars 전부 제거
#   - 요청당 KV 최대 1회 읽기, 변경 없으면 쓰기 0회

name = "bloggerseo"
main = "worker.js"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]

# ─── KV: 슬러그 전용 (유일한 KV, 영속 NoSQL 스토리지) ─────────────
[[kv_namespaces]]
binding = "SLUG_KV"
id      = "4fe8b16587f04703abe9e913763f58f7"

[vars]
RATE_LIMIT_PER_MIN = "600"

# ─── 스케줄드 트리거 (슬러그 감사, 매시간) ──────────────────────────
[triggers]
crons = ["0 * * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[placement]
mode = "smart"
