# wrangler.toml
# Blogspot SEO & Performance Optimization Worker 설정

name = "blogspot-seo-worker"
main = "worker.js"
compatibility_date = "2024-09-23"

# ─── KV 네임스페이스 ───────────────────────────────────────
# 아래 id 값은 본인의 Cloudflare 계정 KV ID로 교체하세요.
# wrangler kv:namespace create SLUG_KV
# wrangler kv:namespace create CACHE_RESERVE_KV
[[kv_namespaces]]
binding = "SLUG_KV"
id      = "dee1ee21fe4c44559bce049b53cf4d0a"

[[kv_namespaces]]
binding = "CACHE_RESERVE_KV"
id      = "7153daa4c5874bc581670f75adf66a22"

# ─── Secret 설정 (필수 1개) ────────────────────────────────
# Cloudflare 대시보드 → Workers & Pages → 해당 워커
# → Settings → Variables and Secrets 에서 아래를 Secret으로 추가:
#
#   BLOGGER_API_KEY   Google Cloud Console에서 발급한 Blogger API 키
#                     (APIs & Services → Credentials → API key)
#                     Blogger API v3 활성화 필요
#
# ※ 이것만 설정하면 blogspot origin이 자동으로 탐지됩니다.

# ─── 스케줄드 트리거 ────────────────────────────────────────
[triggers]
crons = ["0 * * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
